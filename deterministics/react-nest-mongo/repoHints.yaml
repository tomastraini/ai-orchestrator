repoHints:
  rootMarkers:
    - package.json
    - frontend/package.json
    - backend/package.json
  frontendPaths:
    - frontend/src
    - frontend/public
  backendPaths:
    - backend/src
    - backend/test
  databasePaths:
    - backend/src/**/schemas
    - backend/src/**/models
  likelyEntrypoints:
    - frontend/src/main.tsx
    - frontend/src/App.tsx
    - backend/src/main.ts
