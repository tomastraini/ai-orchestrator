apiVersion: v1
kind: deterministicPackSchema
required:
  - apiVersion
  - name
  - displayName
  - targets
  - toolPolicyProfile
  - entrypoints
  - artifacts
properties:
  apiVersion:
    type: string
  name:
    type: string
  displayName:
    type: string
  targets:
    type: object
    required:
      - frontend
      - backend
      - database
  toolPolicyProfile:
    type: string
  entrypoints:
    type: object
    required:
      - commandsFile
      - gatesFile
      - repoHintsFile
      - promptsDir
      - schemasDir
  artifacts:
    type: object
    required:
      - spec
      - plan
      - audit
      - worklog
      - evidenceDir
      - finalReport
